name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  node:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: foodtrace_ci
          POSTGRES_PASSWORD: foodtrace_ci_password
          POSTGRES_USER: foodtrace_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U foodtrace_ci -d foodtrace_ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://foodtrace_ci:foodtrace_ci_password@127.0.0.1:5432/foodtrace_ci
      JWT_ACCESS_SECRET: ci-access-secret-not-used-outside-tests-123456
      JWT_REFRESH_SECRET: ci-refresh-secret-not-used-outside-tests-654321
      NODE_ENV: test
      SWAGGER_ENABLED: 'false'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm prisma:validate
      - run: pnpm prisma:migrate:test
      - run: pnpm build

  flutter:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          cache: true
          channel: stable
          flutter-version: 3.44.6
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart analyze
      - run: flutter test
